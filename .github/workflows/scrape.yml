name: Scrape Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scrape.py

      - name: Commit jobs.json
        run: |
          git config user.name "JobNinja Bot"
          git config user.email "bot@jobninja.dev"
          git add jobs.json
          git diff --staged --quiet || git commit -m "🥷 Auto-scrape: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
